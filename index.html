    <!-- JS -->
    <script>
      function initSmoothScrolling() {
        document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
          anchor.addEventListener("click", function (e) {
            const href = this.getAttribute("href");
            if (!href || href === "#") {
              e.preventDefault();
              return;
            }
            e.preventDefault();
            const target = document.querySelector(href);
            if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
          });
        });
      }

      function handleNavbarScroll() {
        const navbar = document.getElementById("mainNavbar");
        window.addEventListener("scroll", () => {
          if (window.scrollY > 50) {
            navbar.classList.add("scrolled", "shadow-sm");
          } else {
            navbar.classList.remove("scrolled", "shadow-sm");
          }
        });
      }

      function addLoadingAnimation() {
        // Body is hidden via CSS (opacity:0). Reveal once fonts are ready.
        document.fonts.ready.then(() => {
          requestAnimationFrame(() => document.body.classList.add("ready"));
        });
      }

    function initWitchFlyIn() {
        document.querySelectorAll(".floating-witches").forEach((el) => {
            // ensure we trigger after initial layout/opacity transitions
            requestAnimationFrame(() => el.classList.add("in"));
        });
    }

    function initUniverseStars() {
      const container = document.getElementById('universe-stars');
      if (!container) return;

      const starSrcs = [
        'assets/star-black.png',
        'assets/star-gross-weiss.png',
        'assets/star_white.png',
        'assets/star_small_li.png',
        'assets/star_small_re.png'
      ];

      const isMobile = window.innerWidth <= 768;
      const count = isMobile ? 50 : 180;
      // On mobile, fully exclude navbar zone; on desktop, start just below it
      const minY = isMobile ? 10 : 3;
      const frag = document.createDocumentFragment();

      // Soft density: stars near center/navbar are smaller & more transparent
      // instead of hard exclusion zones
      function centerDistance(x, y) {
        // How far from the hero content center (50%, 45%)
        const dx = (x - 50) / 50;  // -1..1
        const dy = (y - 45) / 50;  // roughly -1..1
        return Math.sqrt(dx * dx + dy * dy); // 0 = dead center, ~1.1 = corners
      }

      for (let i = 0; i < count; i++) {
        const img = document.createElement('img');
        img.src = starSrcs[Math.floor(Math.random() * starSrcs.length)];
        img.alt = '';
        img.className = 'universe-star';

        // Generate position; on desktop use a curve for navbar zone:
        // edges (logo/links) → almost no stars, center (empty) → stars allowed
        let x, y;
        do {
          x = Math.random() * 100;
          y = minY + Math.random() * (100 - minY);
          if (isMobile || y >= 8) {
            // Low-probability zone for bottom-center (scroll arrow area)
            if (y > 85 && Math.abs(x - 50) < 6) {
              if (Math.random() < 0.5) continue; // reject 50%
            }
            break;
          }
          // How close to horizontal center (0 = edge, 1 = center)
          const centerness = 1 - Math.abs(x - 50) / 50;
          // Reject probability: high at edges (~98%), low at center (~30%)
          const rejectChance = 0.98 - centerness * 0.68;
          if (Math.random() >= rejectChance) break; // keep this star
        } while (true);

        img.style.left = x.toFixed(2) + '%';
        img.style.top = y.toFixed(2) + '%';

        // Stars near center are smaller and fainter
        const dist = centerDistance(x, y);
        const edgeFactor = Math.min(dist / 0.7, 1); // 0 at center → 1 at edges

        // Size: 4-12px near center, up to 6-28px at edges
        const minSize = 4 + edgeFactor * 2;
        const maxSize = 12 + edgeFactor * 16;
        const size = minSize + Math.random() * (maxSize - minSize);
        img.style.width = size.toFixed(1) + 'px';

        // Base opacity: very faint near center, brighter at edges
        const baseOp = (0.08 + edgeFactor * 0.2 + Math.random() * edgeFactor * 0.45);
        img.style.setProperty('--star-peak', baseOp.toFixed(2));

        // Varied durations (5-10s), delays biased shorter so ~60% appear within 2s
        const dur = (5 + Math.random() * 5).toFixed(1);
        const r = Math.random();
        const delay = (r * r * parseFloat(dur)).toFixed(1); // quadratic bias toward 0
        img.style.animationDuration = dur + 's';
        img.style.animationDelay = delay + 's';

        // Random rotation
        img.style.transform = 'rotate(' + (Math.random() * 360).toFixed(0) + 'deg)';

        frag.appendChild(img);
      }

      container.appendChild(frag);
    }

      document.addEventListener("DOMContentLoaded", function () {
        addLoadingAnimation();
        initSmoothScrolling();
        handleNavbarScroll();
        initWitchFlyIn();
        initUniverseStars();

        // Load gallery from Google Sheets (startpage subset only)
        Gallery.init({
          sheetId: '1JHOWnRZhLHeArlwK8rtSmrmzdYsnnuulh8tUaYkqXZ0',
          gridSelector: '#gallery-grid',
          startpageOnly: true,
          imageBasePath: 'assets/projects/',
          hasLightbox: false
        });
      });
    </script>
