      .spiral-witch {

        opacity: 0;
        transition: opacity 0.3s ease;

        inset: 0;
        pointer-events: none;
        z-index: 1;
      }
      .trail-star {
        position: absolute;
        height: auto;
        pointer-events: none;
        animation: trailTwinkle 3s ease-in-out infinite alternate;

        50%      { filter: brightness(1.2); }

    <script>
      function initSmoothScrolling() {
        document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
          anchor.addEventListener("click", function (e) {
            const href = this.getAttribute("href");
            if (!href || href === "#") {
              e.preventDefault();
              return;
            }
            e.preventDefault();
            const target = document.querySelector(href);
            if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
          });
        });
      }

      function handleNavbarScroll() {
        const navbar = document.getElementById("mainNavbar");
        window.addEventListener("scroll", () => {
          if (window.scrollY > 50) {
            navbar.classList.add("scrolled", "shadow-sm");
          } else {
            navbar.classList.remove("scrolled", "shadow-sm");
          }
        });
      }

      function addLoadingAnimation() {
        // Body is hidden via CSS (opacity:0). Reveal once fonts are ready.
        document.fonts.ready.then(() => {
          requestAnimationFrame(() => document.body.classList.add("ready"));
        });
      }

    function initWitchSpiral() {
      const witch = document.getElementById('spiral-witch');
      const trail = document.getElementById('star-trail');
      if (!witch || !trail) return;

      const starSrcs = [
        'assets/star-black.png',
        'assets/star-gross-weiss.png',
        'assets/star_white.png',
        'assets/star_small_li.png',
        'assets/star_small_re.png'
      ];

      // --- Animation parameters ---
      const totalRevolutions = 3.5;       // how many full circles
      const startRadius = 20;             // px — tight initial orbit
      const endRadius = 320;              // px — final orbit size before fly-off
      const spiralDuration = 4000;        // ms for the spiral phase
      const flyOffDuration = 800;         // ms for the fly-off
      const starInterval = 60;            // ms between star drops
      const startAngle = -Math.PI / 2;   // start at top

      // Center = middle of the hero-content area
      const hero = document.querySelector('.hero-content');
      const heroRect = hero.getBoundingClientRect();
      const heroParent = hero.offsetParent || hero.parentElement;
      const parentRect = heroParent.getBoundingClientRect();

      const cx = heroRect.left + heroRect.width / 2 - parentRect.left;
      const cy = heroRect.top + heroRect.height / 2 - parentRect.top;

      // Position witch at center initially, hidden
      witch.style.left = cx + 'px';
      witch.style.top = cy + 'px';
      witch.style.opacity = '0';

      // Wait for body reveal, then start
      const startDelay = 600;
      setTimeout(() => {
        witch.style.opacity = '1';
        const t0 = performance.now();
        let lastStarTime = 0;
        let prevAngle = startAngle;

        function spiralFrame(now) {
          const elapsed = now - t0;
          const progress = Math.min(elapsed / spiralDuration, 1);

          // Eased progress for smooth acceleration
          const eased = progress < 0.5
            ? 2 * progress * progress
            : 1 - Math.pow(-2 * progress + 2, 2) / 2;

          const angle = startAngle + eased * totalRevolutions * 2 * Math.PI;
          const radius = startRadius + eased * (endRadius - startRadius);

          const x = cx + Math.cos(angle) * radius;
          const y = cy + Math.sin(angle) * radius;

          witch.style.left = x + 'px';
          witch.style.top = y + 'px';

          // Flip witch based on direction of travel
          const dir = angle - prevAngle;
          const vx = -Math.sin(angle); // tangential direction x
          witch.querySelector('.witch').style.transform =
            vx < 0 ? 'scaleX(1)' : 'scaleX(-1)';
          prevAngle = angle;

          // Drop a star every N ms
          if (elapsed - lastStarTime > starInterval) {
            lastStarTime = elapsed;
            dropStar(x, y, eased);
          }

          if (progress < 1) {
            requestAnimationFrame(spiralFrame);
          } else {
            // Fly off on the tangent!
            flyOff(angle, radius, x, y);
          }
        }

        function dropStar(x, y, progress) {
          const img = document.createElement('img');
          img.src = starSrcs[Math.floor(Math.random() * starSrcs.length)];
          img.alt = '';
          img.className = 'trail-star';

          // Stars get bigger as the spiral grows
          const size = 6 + progress * 18 + Math.random() * 8;
          img.style.width = size + 'px';
          img.style.left = x + 'px';
          img.style.top = y + 'px';
          img.style.transform = 'translate(-50%, -50%) rotate(' + (Math.random() * 360) + 'deg)';

          // Fade in with a gentle pop
          img.style.opacity = '0';
          img.style.transition = 'opacity 0.4s ease';
          trail.appendChild(img);

          requestAnimationFrame(() => {
            img.style.opacity = (0.25 + progress * 0.55 + Math.random() * 0.2).toFixed(2);
          });
        }

        function flyOff(angle, radius, startX, startY) {
          // Tangent direction at the final angle
          const tx = -Math.sin(angle);
          const ty = Math.cos(angle);

          // Fly in tangent direction far enough to leave the screen
          const flyDist = Math.max(window.innerWidth, window.innerHeight);
          const endX = startX + tx * flyDist;
          const endY = startY + ty * flyDist;

          const t0 = performance.now();

          function flyFrame(now) {
            const elapsed = now - t0;
            const p = Math.min(elapsed / flyOffDuration, 1);
            // Ease out — fast start, gentle end
            const ease = 1 - Math.pow(1 - p, 3);

            const x = startX + (endX - startX) * ease;
            const y = startY + (endY - startY) * ease;

            witch.style.left = x + 'px';
            witch.style.top = y + 'px';

            // Slight shrink + fade
            witch.style.opacity = (1 - p * 0.5).toFixed(2);
            witch.style.transform = 'translate(-50%, -50%) scale(' + (1 + p * 0.3).toFixed(2) + ')';

            // Drop stars during fly-off too, but sparser
            if (Math.random() < 0.3) {
              dropStar(x, y, 1);
            }

            if (p < 1) {
              requestAnimationFrame(flyFrame);
            } else {
              witch.style.display = 'none';
              // Gently fade trail stars down to a subtle resting opacity
              setTimeout(() => {
                trail.querySelectorAll('.trail-star').forEach(s => {
                  s.style.transition = 'opacity 2s ease';
                  const current = parseFloat(s.style.opacity) || 0.4;
                  s.style.opacity = (current * 0.6).toFixed(2);
                });
              }, 500);
            }
          }

          requestAnimationFrame(flyFrame);
        }

        requestAnimationFrame(spiralFrame);
      }, startDelay);
    }

    function initUniverseStars() {
      const container = document.getElementById('universe-stars');
      if (!container) return;

      const starSrcs = [
        'assets/star-black.png',
        'assets/star-gross-weiss.png',
        'assets/star_white.png',
        'assets/star_small_li.png',
        'assets/star_small_re.png'
      ];

      const isMobile = window.innerWidth <= 768;
      const count = isMobile ? 50 : 180;
      // On mobile, fully exclude navbar zone; on desktop, start just below it
      const minY = isMobile ? 10 : 3;
      const frag = document.createDocumentFragment();

      // Soft density: stars near center/navbar are smaller & more transparent
      // instead of hard exclusion zones
      function centerDistance(x, y) {
        // How far from the hero content center (50%, 45%)
        const dx = (x - 50) / 50;  // -1..1
        const dy = (y - 45) / 50;  // roughly -1..1
        return Math.sqrt(dx * dx + dy * dy); // 0 = dead center, ~1.1 = corners
      }

      for (let i = 0; i < count; i++) {
        const img = document.createElement('img');
        img.src = starSrcs[Math.floor(Math.random() * starSrcs.length)];
        img.alt = '';
        img.className = 'universe-star';

        // Generate position; on desktop use a curve for navbar zone:
        // edges (logo/links) → almost no stars, center (empty) → stars allowed
        let x, y;
        do {
          x = Math.random() * 100;
          y = minY + Math.random() * (100 - minY);
          if (isMobile || y >= 8) break; // below navbar, always ok
          // How close to horizontal center (0 = edge, 1 = center)
          const centerness = 1 - Math.abs(x - 50) / 50;
          // Reject probability: high at edges (~98%), low at center (~30%)
          const rejectChance = 0.98 - centerness * 0.68;
          if (Math.random() >= rejectChance) break; // keep this star
        } while (true);

        img.style.left = x.toFixed(2) + '%';
        img.style.top = y.toFixed(2) + '%';

        // Stars near center are smaller and fainter
        const dist = centerDistance(x, y);
        const edgeFactor = Math.min(dist / 0.7, 1); // 0 at center → 1 at edges

        // Size: 4-12px near center, up to 6-28px at edges
        const minSize = 4 + edgeFactor * 2;
        const maxSize = 12 + edgeFactor * 16;
        const size = minSize + Math.random() * (maxSize - minSize);
        img.style.width = size.toFixed(1) + 'px';

        // Base opacity: very faint near center, brighter at edges
        const baseOp = (0.08 + edgeFactor * 0.2 + Math.random() * edgeFactor * 0.45);
        img.style.setProperty('--star-peak', baseOp.toFixed(2));

        // Varied durations (5-10s), delays biased shorter so ~60% appear within 2s
        const dur = (5 + Math.random() * 5).toFixed(1);
        const r = Math.random();
        const delay = (r * r * parseFloat(dur)).toFixed(1); // quadratic bias toward 0
        img.style.animationDuration = dur + 's';
        img.style.animationDelay = delay + 's';

        // Random rotation
        img.style.transform = 'rotate(' + (Math.random() * 360).toFixed(0) + 'deg)';

        frag.appendChild(img);
      }

      container.appendChild(frag);
    }

      document.addEventListener("DOMContentLoaded", function () {
        addLoadingAnimation();
        initSmoothScrolling();
        handleNavbarScroll();
        initWitchSpiral();
        initUniverseStars();

        // Load gallery from Google Sheets (startpage subset only)
        Gallery.init({

          gridSelector: '#gallery-grid',
          startpageOnly: true,
          imageBasePath: 'assets/projects/',
          hasLightbox: false
        });
      });
    </script>
